[build]
  base    = "frontend"
  command = "npm install --legacy-peer-deps && CI=false npm run build"
  publish = "build"

[build.environment]
  REACT_APP_BACKEND_URL    = "https://flourish123-production.up.railway.app"
  REACT_APP_FRONTEND_URL   = "https://theflourishapp.netlify.app"
  # REACT_APP_EMAILJS_* keys are stored in Netlify environment variables (not committed here)

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
